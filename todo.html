<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="todo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="desk" aria-hidden="true"></div>
    <main class="todo-app">
        <div class="paper" role="application" aria-label="To do list">
            <header class="paper-header">
                <h1 class="paper-title">To do List</h1>
            </header>
            <section class="toolbar paper-toolbar" aria-label="List actions">
                <div class="todo-head">
                    <button type="button" class="deleteAll btn-ink-outline">
                        <i class="fa-solid fa-trash-can" aria-hidden="true"></i>
                        <span>Clear</span>
                    </button>
                    <input type="search" class="search-input" placeholder="Search…" aria-label="Search tasks">
                    <button type="button" class="addButton btn-ink-add" aria-label="Add new item">
                        <i class="fa-solid fa-plus" aria-hidden="true"></i>
                    </button>
                </div>
            </section>
            <section class="todo-wrapper" aria-live="polite">
            </section>
        </div>
    </main>
    <script src="todo.js"></script>
</body>
</html>
